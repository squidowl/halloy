name: Book

on:
  pull_request:
    paths:
      - "book/**.md"
      - "book/book.toml"
  push:
    branches:
      - main
    paths:
      - "book/**.md"
      - "book/book.toml"
  merge_group:
    paths:
      - "book/**.md"
      - "book/book.toml"

jobs:
  build-linkcheck:
    name: Build & Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check internal links
        id: lychee-interal
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --config ./.config/lychee-internal.toml --root-dir='./book/src' './book/**/*.md'
          fail: true

      - name: Check external links
        id: lychee-external
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --config ./.config/lychee-external.toml --root-dir='./book/src' './book/**/*.md'
          fail: true
        continue-on-error: true

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@adeb05db28a0c0004681db83893d56c0388ea9ea # v1
        with:
          mdbook-version: "latest"

      - name: Build book
        run: mdbook build book
