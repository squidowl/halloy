name: Docs Deploy Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set docs metadata
        run: |
          echo "DOCS_VERSION=$(cat ../VERSION)" >> "$GITHUB_ENV"
          echo "DOCS_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        env:
          DOCS_CHANNEL: release
          DOCS_VERSION: ${{ env.DOCS_VERSION }}
          DOCS_SHA: ${{ env.DOCS_SHA }}
        run: bun run docs:build

      - name: Deploy to Vercel
        working-directory: .
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DOCS_VERSION: ${{ env.DOCS_VERSION }}
          DOCS_SHA: ${{ env.DOCS_SHA }}
        run: bunx vercel deploy --prod --yes --token "$VERCEL_TOKEN" --build-env DOCS_CHANNEL=release --build-env DOCS_VERSION="$DOCS_VERSION" --build-env DOCS_SHA="$DOCS_SHA"
