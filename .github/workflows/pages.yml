name: Deploy Documentation

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve stable tag
        id: stable
        run: |
          for tag in $(git tag --sort=-creatordate); do
            if git ls-tree --name-only "$tag":docs >/dev/null 2>&1; then
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No tag with docs/ found" >&2
          exit 1

      - name: Prepare stable worktree
        run: git worktree add --detach /tmp/halloy-stable "${{ steps.stable.outputs.tag }}"

      - name: Install stable dependencies
        working-directory: /tmp/halloy-stable/docs
        run: bun install --frozen-lockfile

      - name: Build stable docs
        working-directory: /tmp/halloy-stable/docs
        env:
          DOCS_BASE: /
          DOCS_OUT_DIR: /tmp/halloy-site
          DOCS_CHANNEL: stable
          DOCS_STABLE_LABEL: Latest (${{ steps.stable.outputs.tag }})
          DOCS_NIGHTLY_LABEL: Nightly
          DOCS_STABLE_URL: https://halloy.chat/
          DOCS_NIGHTLY_URL: https://halloy.chat/nightly/
        run: bun run docs:build

      - name: Install nightly dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build nightly docs
        working-directory: docs
        env:
          DOCS_BASE: /nightly/
          DOCS_OUT_DIR: /tmp/halloy-site/nightly
          DOCS_CHANNEL: nightly
          DOCS_STABLE_LABEL: Latest (${{ steps.stable.outputs.tag }})
          DOCS_NIGHTLY_LABEL: Nightly
          DOCS_STABLE_URL: https://halloy.chat/
          DOCS_NIGHTLY_URL: https://halloy.chat/nightly/
        run: bun run docs:build

      - name: Remove nested nightly CNAME
        run: rm -f /tmp/halloy-site/nightly/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/halloy-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
