name: Docs Deploy Nightly

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-vercel-nightly.yml"

jobs:
  deploy:
    name: Deploy Nightly Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set docs metadata
        run: |
          echo "DOCS_VERSION=$(cat ../VERSION)" >> "$GITHUB_ENV"
          echo "DOCS_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.3
        with:
          node-version: 22

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NIGHTLY }}
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build docs for Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NIGHTLY }}
          DOCS_CHANNEL: nightly
          DOCS_VERSION: ${{ env.DOCS_VERSION }}
          DOCS_SHA: ${{ env.DOCS_SHA }}
        run: npx vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NIGHTLY }}
        run: npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
