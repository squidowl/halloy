name: Checksum

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Specify tag to generate checksum"
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: robinraju/release-downloader@c39a3b234af58f0cf85888573d361fb6fa281534 # v1.10
        with:
          tag: ${{ github.event.inputs.tag }}
          fileName: h*

      - name: Generate checksum
        uses: jmgilman/actions-generate-checksum@238073f4c02f2810adb91c96bdd1e276a5ae9ed6 # v1
        with:
          patterns: h*
          method: sha256
          output: checksums.txt

      - name: Publish checksums
        uses: svenstaro/upload-release-action@b98a3b12e86552593f3e4e577ca8a62aa2f3f22b # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: checksums.txt
          tag: ${{ github.event.inputs.tag }}
          overwrite: true
